template_id: maersk_offer_block_v1
template_name: Maersk Offer Block v1
provider_name: MAERSK
parser_family: offer_block
document_type: ocean_export
file_type: xlsx
active: true

match_rules:
  filename_contains:
    - "MAERSK"
  required_header_labels:
    - "Scheduled Route"
    - "Rate Validity"
    - "Surcharge Name"
  sheet_name_contains_any:
    - "Maersk"

sheet_rules:
  include_sheet_name_contains:
    - "Maersk"

offer_block_rules:
  offer_prefix: "Offer"

defaults:
  carrier_name: MAERSK
  currency_default: USD
  equipment_type: 40HDRY
  all_in_flag: false

validation:
  amount_min: 0
  amount_max: 100000
